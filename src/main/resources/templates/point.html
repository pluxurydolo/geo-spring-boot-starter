<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${mapTitle}">Map</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.2.1/ol.css" />
    <link rel="stylesheet" th:href="@{/css/point.css}"/>
</head>
<body>

<div id="header">
    <h2>
        <span class="title-text" th:text="${mapTitle}">Map</span>
        <span class="badge" th:text="${pointCount} + ' точек'"></span>
        <span class="user-label">
            Пользователь: <span th:text="${user}"></span>
        </span>
    </h2>
</div>

<div id="map"></div>

<script src="https://cdn.jsdelivr.net/npm/ol@v10.2.1/dist/ol.min.js"></script>
<script th:src="@{/js/point.js}"></script>

<script th:inline="javascript">
    const points = /*[[${points}]]*/ [];
    const user = /*[[${user}]]*/ '';

    let geoMap = null;

    function initApp(points, user) {
        geoMap = new GeoMap();
        geoMap.init(points, user);
    }

    initApp(points, user);

    globalThis.initApp = initApp;
</script>
</body>
</html>
