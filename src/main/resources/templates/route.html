<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${mapTitle}">Map</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.2.1/ol.css"/>
    <link rel="stylesheet" th:href="@{/css/route.css}"/>
</head>
<body>

<div id="header">
    <h2>
        <span class="title-text" th:text="${mapTitle}">Map</span>
        <span class="badge" th:text="${pointCount} + ' точек'">0 точек</span>
        <span class="user-label">
            Пользователь: <span th:text="${user}"></span>
        </span>
    </h2>
    <div class="controls">
        <a th:href="${yandexUrl}" target="_blank" class="yandex-btn">
            Открыть в Яндекс Картах
        </a>
    </div>
</div>

<div id="map"></div>

<script src="https://cdn.jsdelivr.net/npm/ol@v10.2.1/dist/ol.min.js"></script>
<script th:src="@{/js/route.js}"></script>

<script th:inline="javascript">
    const geoRouteData = /*[[${geoRouteData}]]*/ null;
    const id = /*[[${id}]]*/ null;
    const user = /*[[${user}]]*/ '';
    const profileName = /*[[${profileName}]]*/ '';

    let routeMap = null;

    function initApp(geoRouteData, id, user, profileName) {
        routeMap = new RouteMap();
        routeMap.init(geoRouteData, id, user, profileName);
    }

    initApp(geoRouteData, id, user, profileName);

    globalThis.initApp = initApp;
</script>

</body>
</html>
